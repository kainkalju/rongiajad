<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024" width="1024" height="1024">
  <!-- Orange background -->
  <rect width="1024" height="1024" fill="#ff711d"/>

  <!-- Train body — rounded rectangle -->
  <rect x="212" y="100" width="600" height="620" rx="90" ry="90" fill="#1a1a1a"/>

  <!-- Roof handle / destination board cutout -->
  <rect x="387" y="140" width="250" height="80" rx="40" ry="40" fill="#ff711d"/>

  <!-- Main windshield -->
  <rect x="272" y="270" width="480" height="280" rx="30" ry="30" fill="#ff711d"/>

  <!-- Left headlight -->
  <circle cx="332" cy="640" r="80" fill="#ff711d"/>

  <!-- Right headlight -->
  <circle cx="692" cy="640" r="80" fill="#ff711d"/>

  <!-- Rail tracks -->
  <!-- Left rail -->
  <rect x="268" y="800" width="60" height="160" rx="20" ry="20" fill="#1a1a1a"/>
  <!-- Right rail -->
  <rect x="696" y="800" width="60" height="160" rx="20" ry="20" fill="#1a1a1a"/>
  <!-- Sleeper / crossbar -->
  <rect x="200" y="900" width="624" height="55" rx="20" ry="20" fill="#1a1a1a"/>
</svg>
